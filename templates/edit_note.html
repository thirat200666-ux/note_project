{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-warning text-dark">
                <h4 class="mb-0">แก้ไขบันทึก</h4>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('edit_note', id=note.id) }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">หัวข้อ (Title)</label>
                        <input type="text" name="title" class="form-control" value="{{ note.title }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">เนื้อหา (Content)</label>
                        <textarea name="content" class="form-control" rows="6">{{ note.content }}</textarea>
                    </div>
                    <div class="d-flex justify-content-end gap-2">
                        <a href="{{ url_for('index') }}" class="btn btn-secondary">ยกเลิก</a>
                        <button type="submit" class="btn btn-success">บันทึกการแก้ไข</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
