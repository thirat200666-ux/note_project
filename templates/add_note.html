{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">สร้างบันทึกใหม่</h4>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('add_note') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">หัวข้อ (Title)</label>
                        <input type="text" name="title" class="form-control" placeholder="ใส่หัวข้อบันทึก..." required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">เนื้อหา (Content)</label>
                        <textarea name="content" class="form-control" rows="6" placeholder="จดรายละเอียดที่นี่..."></textarea>
                    </div>
                    <div class="d-flex justify-content-end gap-2">
                        <a href="{{ url_for('index') }}" class="btn btn-secondary">ยกเลิก</a>
                        <button type="submit" class="btn btn-primary">บันทึกข้อมูล</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
